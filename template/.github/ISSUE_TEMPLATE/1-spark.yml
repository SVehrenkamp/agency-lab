name: Spark
description: Capture a raw idea for the backlog — one paragraph and a gut-check.
title: "[Spark] "
labels: ["spark"]
body:
  - type: markdown
    attributes:
      value: |
        The cheap front door. Most sparks die here, and that's the point. Keep it short.
  - type: textarea
    id: idea
    attributes:
      label: The idea in a sentence or two
      placeholder: What is it?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem or opportunity does it chase?
    validations:
      required: true
  - type: dropdown
    id: gut-check
    attributes:
      label: Gut-check
      options:
        - "Promote — worth the heavyweight pipeline"
        - "Park — interesting, not now"
        - "Pass — not pursuing"
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        > Promoting a spark crosses the **graduation gate** into Kickoff. Move this
        > issue to the `01 · Kickoff` milestone when you promote it.
